<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASSETSKART – Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --card:#16161f;
  --card2:#1e1e2a;
  --coral:#ff5f40;
  --orange:#ff9a3c;
  --grad:linear-gradient(135deg,#ff5f40,#ff9a3c);
  --text:#f4f4f6;
  --muted:#8888a0;
  --border:#ffffff0d;
  --radius:20px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--grad);border-radius:99px;}

#page-admin{display:none; min-height: 100vh;}
#page-admin.active{display:flex;}
.admin-sidebar{
  width:75px;background:#0d0d14;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 0;gap:14px;
  position:fixed;top:0;left:0;height:100vh;
  border-right:1px solid var(--border);
  z-index: 1000;
}
.admin-sidebar .logo{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:10px;letter-spacing:-0.5px;
}
.nav-btn{
  width:52px;height:52px;background:var(--grad);border:none;border-radius:14px;
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 15px #ff5f4033;
}
.nav-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px #ff5f4055;}
.nav-btn.active{box-shadow:0 0 0 3px #ff9a3c88;}
.admin-main{margin-left:75px;padding:28px 20px;flex:1;max-width:600px;}
.admin-page{display:none;}
.admin-page.active{display:block;}
.a-header{margin-bottom:26px;}
.a-header h1{
  font-family:'Syne',sans-serif;font-size:34px;font-weight:800;line-height:1.1;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.a-header p{color:var(--muted);font-size:14px;margin-top:6px;}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:26px;}
.stat-card{background:var(--card);border-radius:18px;padding:18px;border:1px solid var(--border);}
.stat-card .slbl{font-size:12px;color:var(--muted);margin-bottom:6px;}
.stat-card .sval{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.form-card{background:var(--card);border-radius:18px;padding:22px 18px;margin-bottom:24px;border:1px solid var(--border);}
.form-card h2{font-size:16px;font-weight:700;margin-bottom:18px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:600;}
.field input,.field textarea,.field select{
  width:100%;background:var(--card2);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--coral);}
.field textarea{resize:none;height:90px;}
.price-wrap{position:relative;}
.price-wrap span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--orange);font-weight:700;font-size:15px;}
.price-wrap input{padding-left:32px;}
.upload-box{
  border:2px dashed #ff9a3c88;border-radius:14px;min-height:130px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;background:#ff9a3c08;position:relative;overflow:hidden;
}
.upload-box input[type="file"]{display:none;}
.upload-label{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;width:100%;height:100%;padding:20px;justify-content:center;}
.upload-icon{font-size:32px;}
.upload-text{font-size:13px;font-weight:600;color:var(--orange);}
.preview-img{width:100%;height:160px;object-fit:cover;border-radius:12px;display:none;}
.remove-img{position:absolute;top:8px;right:8px;background:#ff5f40cc;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;color:white;cursor:pointer;display:none;align-items:center;justify-content:center;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:14px 20px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--grad);color:white;width:100%;box-shadow:0 4px 18px #ff5f4044;}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:11px;}
.btn-edit{background:var(--grad);color:white;}
.btn-delete{background:#2a1a1a;color:#ff5f40;border:1.5px solid #ff5f4044;}

.sec-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text);}
.products-list{display:flex;flex-direction:column;gap:16px;}
.pcard{background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--border);}
.pcard .ci{width:100%;height:150px;object-fit:cover;display:block;}
.pcard .cip{width:100%;height:150px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:46px;}
.pcard .cb{padding:16px;}
.pcard .ctag{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.pcard .ct{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px;}
.pcard .cd{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.pcard .cp{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.card-actions{display:flex;gap:10px;}
.empty-state{text-align:center;padding:40px 20px;background:var(--card);border-radius:18px;}
.empty-state .ei{font-size:48px;margin-bottom:12px;}
.empty-state p{color:var(--muted);font-size:14px;}

.modal-overlay{display:flex;position:fixed;inset:0;z-index:2000;background:#000000ee;backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none !important;}
.modal{background:var(--card);border-radius:var(--radius);padding:32px;max-width:360px;width:100%;border:1px solid var(--border);}
.btn-submit{width:100%;padding:15px;background:var(--grad);border:none;border-radius:14px;color:white;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:12px;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--grad);color:white;padding:12px 24px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.3s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:640px){
  .admin-sidebar {
    width: 100%; height: 70px; flex-direction: row; position: fixed; bottom: 0; top: auto;
    left: 0; right: 0; padding: 0 16px; justify-content: space-around;
    border-right: none; border-top: 1px solid var(--border); background: #0d0d14;
  }
  .admin-sidebar .logo { display: none; }
  .nav-btn { width: 45px; height: 45px; font-size: 20px; }
  .admin-main { margin-left: 0; padding: 16px 16px 90px; max-width: 100%; }
}
</style>
</head>
<body>

<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="font-size:40px;margin-bottom:10px;">🔐</div>
      <h3 style="font-size:20px;font-family:'Syne',sans-serif;font-weight:800;">Admin Login</h3>
      <p style="font-size:13px;color:var(--muted);margin-top:6px;">Enter credentials to manage store</p>
    </div>
    <div class="field" style="margin-bottom:14px;">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field" style="margin-bottom:22px;">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="login-error" style="color:#ff5f40;font-size:13px;text-align:center;margin-bottom:14px;display:none;">❌ Wrong username or password!</div>
    <button class="btn-submit" onclick="doLogin()">Login to Admin ⚡</button>
    <div style="text-align:center;margin-top:10px;">
      <a href="index.html" style="color:var(--muted);font-size:13px;text-decoration:none;">← Back to Website</a>
    </div>
  </div>
</div>

<div class="page" id="page-admin">
  <aside class="admin-sidebar">
    <div class="logo">AK</div>
    <button class="nav-btn active" onclick="showAdminTab('dashboard',this)" title="Dashboard">🏠</button>
    <button class="nav-btn" onclick="showAdminTab('products',this)" title="Products">📦</button>
    <button class="nav-btn" onclick="clearAll()" title="Clear Store" style="background:#2a1a1a;color:#ff5f40;">🗑️</button>
    <a href="index.html" class="nav-btn" title="View Website" style="background:var(--card2);box-shadow:none;text-decoration:none;color:white;">🌐</a>
  </aside>

  <main class="admin-main">
    <div class="admin-page active" id="atab-dashboard">
      <div class="a-header">
        <h1>Dashboard Overview</h1>
        <p>Manage your ASSETSKART store from here.</p>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="slbl">Total Products</div><div class="sval" id="s-count">0</div></div>
        <div class="stat-card"><div class="slbl">Total Value</div><div class="sval" id="s-value">₹0</div></div>
      </div>

      <div class="form-card">
        <h2 id="form-title">➕ Add New Product</h2>
        <div class="field">
          <label>Product Title</label>
          <input type="text" id="inp-title" placeholder="e.g. 3D Skeleton Reels Bundle">
        </div>
        <div class="field">
          <label>Category</label>
          <select id="inp-cat">
            <option value="reels">🎬 Reels Bundle</option>
            <option value="trending">✨ Trending Pack</option>
            <option value="niche">🎭 Niche Bundle</option>
            <option value="premium">💎 Premium Pack</option>
          </select>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="inp-desc" placeholder="Describe your product..."></textarea>
        </div>
        <div class="field">
          <label>Price</label>
          <div class="price-wrap"><span>₹</span><input type="number" id="inp-price" placeholder="599"></div>
        </div>
        <div class="field">
          <label>Product Image</label>
          <div class="upload-box" id="upload-box">
            <input type="file" id="img-input" accept="image/*">
            <label class="upload-label" for="img-input" id="upload-label">
              <span class="upload-icon">📷</span>
              <span class="upload-text">Upload Product Image</span>
            </label>
            <img class="preview-img" id="preview-img" src="" alt="">
            <button class="remove-img" id="remove-img" onclick="removeImage(event)">✕</button>
          </div>
        </div>
        <button class="btn btn-primary" onclick="submitProduct()"><span id="btn-label">✚ Save Product</span></button>
      </div>
    </div>

    <div class="admin-page" id="atab-products">
      <div class="a-header"><h1>All Products</h1><p>Browse and manage all items in your store.</p></div>
      <div class="products-list" id="admin-products-list"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════
// SUPABASE CONFIG
// ════════════════════════════════════
const SUPABASE_URL = 'https://ukoxrbvtbfravlbjasnt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_44LFF26HauRZwsWVBiaA_w_nfkzdQCr';

async function supabaseFetch(path, options = {}) {
  const url = SUPABASE_URL + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': options.prefer || '',
    ...options.headers
  };
  delete headers.prefer;
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

let products = [];
let editId = null;
let currentImgBase64 = '';

// ADMIN LOGIN
const ADMIN_USER = 'AK_Owner7';
const ADMIN_PASS = 'Kart#9271@AK';

function doLogin(){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById('login-modal').classList.add('hidden');
    document.getElementById('page-admin').classList.add('active');
    showToast('✅ Welcome to Admin Panel!');
    loadProducts();
  } else {
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
  }
}

// TABS
function showAdminTab(tab, btn){
  document.querySelectorAll('.admin-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('atab-'+tab).classList.add('active');
  if(btn) btn.classList.add('active');
}

// IMAGE UPLOAD
document.getElementById('img-input').addEventListener('change',function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    currentImgBase64 = ev.target.result;
    document.getElementById('preview-img').src = currentImgBase64;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('upload-label').style.display = 'none';
    document.getElementById('remove-img').style.display = 'flex';
  };
  reader.readAsDataURL(file);
});

function removeImage(e){
  e.preventDefault(); e.stopPropagation();
  currentImgBase64 = '';
  document.getElementById('preview-img').style.display='none';
  document.getElementById('preview-img').src='';
  document.getElementById('upload-label').style.display='flex';
  document.getElementById('remove-img').style.display='none';
  document.getElementById('img-input').value='';
}

// ════════════════════════════════════
// LOAD PRODUCTS
// ════════════════════════════════════
async function loadProducts() {
  try {
    const data = await supabaseFetch('/rest/v1/products?select=*&order=created_at.desc');
    products = data;
    renderAdmin();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed to load products');
  }
}

// ════════════════════════════════════
// CRUD OPERATIONS
// ════════════════════════════════════
async function submitProduct(){
  const title = document.getElementById('inp-title').value.trim();
  const cat   = document.getElementById('inp-cat').value;
  const desc  = document.getElementById('inp-desc').value.trim();
  const price = document.getElementById('inp-price').value.trim();

  if(!title||!desc||!price){showToast('⚠️ Please fill all fields!');return;}

  const payload = { title, cat, desc, price: parseFloat(price), img: currentImgBase64 };

  try {
    if(editId !== null){
      await supabaseFetch('/rest/v1/products?id=eq.' + editId, {
        method: 'PATCH',
        body: JSON.stringify(payload),
        headers: { 'Prefer': 'return=minimal' }
      });
      editId = null;
      document.getElementById('form-title').textContent = '➕ Add New Product';
      showToast('✅ Product updated successfully!');
    } else {
      await supabaseFetch('/rest/v1/products', {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Prefer': 'return=minimal' }
      });
      showToast('🎉 Product added to store!');
    }
    clearForm();
    await loadProducts();
  } catch(e) {
    console.error(e);
    showToast('❌ Error saving product. Check Supabase table.');
  }
}

function clearForm(){
  document.getElementById('inp-title').value='';
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-price').value='';
  document.getElementById('inp-cat').value='reels';
  removeImage({preventDefault:()=>{},stopPropagation:()=>{}});
}

function editProduct(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  document.getElementById('inp-title').value=p.title;
  document.getElementById('inp-desc').value=p.desc;
  document.getElementById('inp-price').value=p.price;
  document.getElementById('inp-cat').value=p.cat;
  editId = id;

  if(p.img){
    currentImgBase64 = p.img;
    document.getElementById('preview-img').src = p.img;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('upload-label').style.display = 'none';
    document.getElementById('remove-img').style.display = 'flex';
  }

  document.getElementById('form-title').textContent = '✏️ Edit Product';
  showAdminTab('dashboard', document.querySelector('.nav-btn'));
  window.scrollTo({top:0,behavior:'smooth'});
}

async function deleteProduct(id){
  if(!confirm("Are you sure you want to delete this product?")) return;
  try {
    await supabaseFetch('/rest/v1/products?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'Prefer': 'return=minimal' }
    });
    showToast('🗑️ Product Deleted');
    await loadProducts();
  } catch(e) {
    console.error(e);
    showToast('❌ Error deleting product');
  }
}

async function clearAll(){
  if(!products.length){showToast('Store is already empty!');return;}
  if(!confirm("⚠️ DANGER: Delete ALL products from store? This cannot be undone!")) return;
  try {
    await supabaseFetch('/rest/v1/products?id=neq.0', {
      method: 'DELETE',
      headers: { 'Prefer': 'return=minimal' }
    });
    showToast('🗑️ All products cleared');
    await loadProducts();
  } catch(e) {
    console.error(e);
    showToast('❌ Error clearing products');
  }
}

// ════════════════════════════════════
// RENDER ADMIN
// ════════════════════════════════════
const catLabels = {reels:'🎬 Reels Bundle', trending:'✨ Trending Pack', niche:'🎭 Niche Bundle', premium:'💎 Premium Pack'};

function renderAdmin(){
  const list = document.getElementById('admin-products-list');

  if(!products.length){
    list.innerHTML='<div class="empty-state"><div class="ei">📭</div><p>No products yet. Add your first one from Dashboard!</p></div>';
  } else {
    let html = '';
    products.forEach((p) => {
      html += `
      <div class="pcard">
        ${p.img ? `<img class="ci" src="${p.img}">` : `<div class="cip">🎬</div>`}
        <div class="cb">
          <div class="ctag">${catLabels[p.cat]||'🎬 Reels Bundle'}</div>
          <div class="ct">${p.title}</div>
          <div class="cd">${p.desc}</div>
          <div class="cp">₹${Number(p.price).toLocaleString('en-IN')}</div>
          <div class="card-actions">
            <button class="btn btn-sm btn-edit" onclick="editProduct('${p.id}')">✏️ Edit</button>
            <button class="btn btn-sm btn-delete" onclick="deleteProduct('${p.id}')">🗑️ Delete</button>
          </div>
        </div>
      </div>`;
    });
    list.innerHTML = html;
  }

  document.getElementById('s-count').textContent = products.length;
  document.getElementById('s-value').textContent = '₹'+products.reduce((s,p)=>s+Number(p.price),0).toLocaleString('en-IN');
}

// TOAST
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
